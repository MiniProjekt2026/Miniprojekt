<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine ønskelister – Ønskelisten</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/users/{userId}/wishlists(userId=${userId})}">Ønske<span>listen</span></a>
    <div class="navbar-links">
        <a th:href="@{/home/{userId}(userId=${userId})}">Forside</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="top-row">
        <div class="page-header" style="margin-bottom:0">
            <h1>Mine ønskelister</h1>
            <p>Administrer dine ønskelister</p>
        </div>
        <div class="section-actions">
            <a class="btn btn-primary" th:href="@{/users/{userId}/wishlists/add(userId=${userId})}">
                + Ny ønskeliste
            </a>
        </div>
    </div>

    <div th:if="${wishLists != null and !wishLists.isEmpty()}" class="wishlist-grid">
        <div th:each="wl : ${wishLists}" class="wishlist-card">
            <div class="wishlist-card-info">
                <h3 th:text="${wl.name}">Ønskeliste navn</h3>
                <p>Ønskeliste</p>
            </div>
            <div class="wishlist-card-actions">
                <a class="btn btn-secondary btn-sm"
                   th:href="@{/users/{userId}/wishlists/{wishListId}/edit(userId=${userId}, wishListId=${wl.wishListId})}">
                    Rediger
                </a>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/users/{userId}/wishlists/{wishListId}(userId=${userId}, wishListId=${wl.wishListId})}">
                    Åbn
                </a>
                <form th:action="@{/users/{userId}/wishlists/{wishListId}/delete(userId=${userId}, wishListId=${wl.wishListId})}"
                      method="post" style="display:inline"
                      onsubmit="return confirm('Er du sikker på du vil slette listen?')">
                    <button type="submit" class="btn btn-danger btn-sm">Slet</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${wishLists == null or wishLists.isEmpty()}" class="empty-state card">
        <span class="icon">☁️</span>
        <h3>Ingen ønskelister endnu</h3>
        <p>Opret din første ønskeliste og begynd at tilføje ønsker</p>
        <a class="btn btn-primary" th:href="@{/users/{userId}/wishlists/add(userId=${userId})}">
            + Opret ønskeliste
        </a>
    </div>
</div>

</body>
</html>
