<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Wish</title>
</head>
<body>

<h1>Rediger ønskeliste</h1>

<form th:action="@{/wishes/update}" method="post" th:object="${wish}">

    <!-- ID med -->
    <input type="hidden" th:field="*{id}" />

    <label>Navn:</label><br>
    <input type="text" th:field="*{name}" /><br><br>

    <label>Beskrivelse:</label><br>
    <input type="text" th:field="*{description}" /><br><br>

    <label>Pris:</label><br>
    <input type="number" step="0.01" th:field="*{price}" /><br><br>

    <label>Antal:</label><br>
    <input type="number" min="1" th:field="*{quantity}" /><br><br>

    <label>Tags:</label><br>
    <select th:field="*{tags}" multiple>
        <option th:each="tag : ${allTags}"
                th:value="${tag}"
                th:text="${tag}">
        </option>
    </select><br><br>

    <button type="submit">Opdater</button>

</form>

</body>
</html>
