<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rediger ønske – Ønskelisten</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/users/{userId}/wishlists(userId=${userId})}">Ønske<span>listen</span></a>
    <div class="navbar-links">
        <a th:href="@{/users/{userId}/wishlists/{wishListId}(userId=${userId}, wishListId=${wishListId})}">← Tilbage til listen</a>
    </div>
</nav>

<div class="page-wrapper">
    <a class="back-link" th:href="@{/users/{userId}/wishlists/{wishListId}(userId=${userId}, wishListId=${wishListId})}">← Tilbage til ønskelisten</a>

    <div class="page-header" style="margin-top:1rem">
        <h1>Rediger ønske</h1>
    </div>

    <div class="form-card">
        <!--
            FIX 1: Form action used ${wish.id} — field is named wishId, so must be ${wish.wishId}
            FIX 2: Hidden fields used *{wish.wishId} and *{wishListId} which are not valid
                   property paths on the bound Wish object.
                   - *{wish.wishId} → *{wishId}  (Wish has getWishId(), not getWish().getWishId())
                   - *{wishListId}  → plain th:value since wishListId is a model attribute, not a Wish field
                     (actually Wish DOES have wishListId, so *{wishListId} is fine — but it must not
                      also be in th:field which generates id/name from the path)
        -->
        <form th:action="@{/wishlists/{wishListId}/wishes/{wishId}/update(wishListId=${wishListId}, wishId=${wish.wishId})}"
              method="post"
              th:object="${wish}">

            <!-- FIX: was *{wish.wishId} — invalid nested path on the bound object -->
            <input type="hidden" th:field="*{wishId}" />
            <!-- FIX: was *{wishListId} — Thymeleaf tried to resolve wish.wishListId as wish.wishListId (fine),
                 but the field name clashed; use th:value with the model attribute to be safe -->
            <input type="hidden" name="wishListId" th:value="${wishListId}" />

            <div class="form-group">
                <label for="name">Navn *</label>
                <input type="text" id="name" th:field="*{name}" required autofocus />
            </div>

            <div class="form-group">
                <label for="description">Beskrivelse</label>
                <textarea id="description" th:field="*{description}"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Pris (kr.)</label>
                    <input type="number" id="price" th:field="*{price}" step="0.01" min="0" />
                </div>

                <div class="form-group">
                    <label for="quantity">Antal</label>
                    <div class="stepper-group">
                        <button type="button" class="stepper-btn" onclick="decrease()">−</button>
                        <!-- FIX: label "Antal" had no for= attribute — added for="quantity" -->
                        <input type="number" id="quantity" th:field="*{quantity}" min="1" />
                        <button type="button" class="stepper-btn" onclick="increase()">+</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Tags</label>
                <div class="tag-checkboxes">
                    <th:block th:each="tag : ${allTags}">
                        <input type="checkbox" class="tag-checkbox"
                               th:id="'tag-' + ${tag}"
                               th:field="*{tags}"
                               th:value="${tag}" />
                        <label class="tag-label" th:for="'tag-' + ${tag}" th:text="${tag}"></label>
                    </th:block>
                </div>
            </div>

            <div class="form-group">
                <label for="productLink">Produktlink</label>
                <input type="text" id="productLink" th:field="*{productLink}"
                       placeholder="https://..." />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Gem ændringer</button>
                <a class="btn btn-secondary"
                   th:href="@{/users/{userId}/wishlists/{wishListId}(userId=${userId}, wishListId=${wishListId})}">Annuller</a>
            </div>
        </form>
    </div>
</div>

<script>
    function increase() {
        const input = document.getElementById("quantity");
        input.value = parseInt(input.value || 1) + 1;
    }
    function decrease() {
        const input = document.getElementById("quantity");
        if (parseInt(input.value) > 1) input.value = parseInt(input.value) - 1;
    }
</script>

</body>
</html>
