<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Edit Wish</title>
</head>
<body>

<header>
    <h1>Wish App</h1>
    <nav>
        <a th:href="@{/}">Forside</a>
    </nav>
    <hr>
</header>

<main>
    <h2>Rediger wish</h2>

    <form th:action="@{/wishlists/{wishListId}/wishes/update(wishListId=${wishListId})}" method="post" th:object="${wish}">

        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{wishListId}" />

        <label>Navn:</label><br>
        <input type="text" th:field="*{name}" /><br><br>

        <label>Beskrivelse:</label><br>
        <input type="text" th:field="*{description}" /><br><br>

        <label>Pris:</label><br>
        <input type="number" step="0.01" th:field="*{price}" /><br><br>

        <label>Antal:</label><br>
        <input type="number" min="1" th:field="*{quantity}" /><br><br>

        <label>Tags:</label><br>
        <select th:field="*{tags}" multiple>
            <option th:each="tag : ${allTags}"
                    th:value="${tag}"
                    th:text="${tag}">
            </option>
        </select><br><br>

        <label>Produktlink:</label><br>
        <input type="text" th:field="*{productLink}" /><br><br>

        <button type="submit">Opdater</button>

    </form>
</main>

</body>
</html>
