<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${wishList.name} + ' – Delt ønskeliste'">Delt ønskeliste</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <!-- Ingen userId her -->
    <a class="navbar-brand" href="/">Ønske<span>listen</span></a>
</nav>

<div class="page-wrapper">

    <div class="top-row" style="margin-top:1rem">
        <div class="page-header" style="margin-bottom:0">
            <h1 th:text="${wishList.name}">Ønskeliste</h1>
            <p>Delt ønskeliste</p>
        </div>
    </div>

    <!-- Liste -->
    <div th:if="${wishes != null and !wishes.isEmpty()}" class="wish-list">


        <!--
            FIX: fjernet link (th:href) så det ikke sender folk ind i ejer-flowet
            (WishController bruger nemlig userId redirects)
        -->
        <div th:each="wish : ${wishes}" class="wish-item">

            <div class="wish-item-info">
                <h4 th:text="${wish.name}">Ønske</h4>

                <p th:text="${wish.description != null and !#strings.isEmpty(wish.description)
                             ? wish.description
                             : 'Ingen beskrivelse'}">
                    Beskrivelse
                </p>

                <!-- Tags (valgfri men nice touch) -->
                <div th:if="${wish.tags != null and !wish.tags.isEmpty()}">
                    <span th:each="tag : ${wish.tags}"
                          style="margin-right:5px; font-size:0.8em;">
                        #<span th:text="${tag}">tag</span>
                    </span>
                </div>
            </div>

            <div class="wish-item-meta">
                <span class="price-badge"
                      th:text="${wish.price != null ? wish.price + ' kr.' : 'Pris ukendt'}">
                    Pris
                </span>

                <!-- Produktlink (kun visning) -->
                <div th:if="${wish.productLink != null and !#strings.isEmpty(wish.productLink)}">
                    <a th:href="${wish.productLink}" target="_blank">Se produkt</a>
                </div>
            </div>

            <div>

                <!-- Ikke reserveret -->
                <form th:if="${!wish.reserved}"
                      th:action="@{'/shared/wishlists/' + ${wishList.wishListId} + '/wishes/' + ${wish.wishId} + '/reserve'}"
                      method="post">
                    <button type="submit">Reserver</button>
                </form>

                <!--Allerede reserveret -->
                <form th:if="${wish.reserved}"
                      th:action="@{'/shared/wishlists/' + ${wishList.wishListId} + '/wishes/' + ${wish.wishId} + '/unreserve'}"
                      method="post">
                    <button type="submit">Fjern reservation</button>
                </form>

            </div>

        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${wishes == null or wishes.isEmpty()}" class="empty-state card">
        <span class="icon">🎁</span>
        <h3>Ingen ønsker endnu</h3>
        <p>Denne ønskeliste er tom</p>
    </div>

</div>

</body>
</html>
