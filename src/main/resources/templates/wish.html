<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title th:text="${wish.name} + ' – Ønskeskyen'">Ønske – Ønskeskyen</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/wishlists/{id}(id=${wish.wishListId})}">Øske<span>skyen</span></a>
    <div class="navbar-links">
        <a th:href="@{/wishlists/{id}(id=${wish.wishListId})}">← Tilbage til listen</a>
    </div>
</nav>

<div class="page-wrapper">
    <a class="back-link" th:href="@{/wishlists/{id}(id=${wish.wishListId})}">← Tilbage til ønskelisten</a>

    <div class="top-row" style="margin-top:1rem">
        <div class="page-header" style="margin-bottom:0">
            <h1 th:text="${wish.name}">Ønske</h1>
        </div>
        <div class="section-actions">
            <a class="btn btn-secondary btn-sm"
               th:href="@{/wishlists/{wishListId}/wishes/edit/{wishId}(wishListId=${wish.wishListId}, wishId=${wish.id})}">
                Rediger
            </a>
            <form th:action="@{/wishlists/{wishListId}/wishes/delete/{wishId}(wishListId=${wish.wishListId}, wishId=${wish.id})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Er du sikker på du vil slette dette ønske?')">
                <button type="submit" class="btn btn-danger btn-sm">Slet</button>
            </form>
        </div>
    </div>

    <div class="divider"></div>

    <div class="card">
        <div class="wish-detail-grid">
            <div class="detail-item">
                <label>Pris</label>
                <p th:text="${wish.price != null ? wish.price + ' kr.' : '–'}">–</p>
            </div>
            <div class="detail-item">
                <label>Antal</label>
                <p th:text="${wish.quantity != null ? wish.quantity : '–'}">–</p>
            </div>
            <div class="detail-item" style="grid-column: 1 / -1" th:if="${wish.description}">
                <label>Beskrivelse</label>
                <p th:text="${wish.description}">–</p>
            </div>
            <div class="detail-item" style="grid-column: 1 / -1" th:if="${wish.productLink}">
                <label>Produktlink</label>
                <a th:href="${wish.productLink}" th:text="${wish.productLink}" target="_blank" rel="noopener">–</a>
            </div>
        </div>

        <div th:if="${wish.tags != null and !wish.tags.isEmpty()}">
            <div class="divider"></div>
            <label style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted)">Tags</label>
            <div class="tags-list">
                <span class="tag" th:each="tag : ${wish.tags}" th:text="${tag}"></span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
