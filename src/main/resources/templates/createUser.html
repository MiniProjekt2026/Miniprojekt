<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Opret bruger – Ønskeskyen</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Ønskeskyen</h1>
            <p>Opret en gratis konto</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/user/saveUser}" method="post" th:object="${user}">
            <div class="form-group">
                <label for="username">Brugernavn</label>
                <input type="text" id="username" name="username" th:field="*{username}"
                       placeholder="Vælg et brugernavn" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">Adgangskode</label>
                <input type="password" id="password" name="password" th:field="*{password}"
                       placeholder="Vælg en adgangskode" required />
            </div>

            <button type="submit" class="btn btn-primary btn-block">Opret bruger</button>
        </form>

        <div class="auth-footer">
            Har du allerede en konto? <a th:href="@{/user/login}">Log ind</a>
        </div>
    </div>
</div>

</body>
</html>
