<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind – Ønskelisten</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Ønske<span>listen</span></h1>
            <p>Log ind for at se dine ønskelister</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/user/login}" method="post">
            <div class="form-group">
                <label for="username">Brugernavn</label>
                <input type="text" id="username" name="username"
                       placeholder="Dit brugernavn" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">Adgangskode</label>
                <input type="password" id="password" name="password"
                       placeholder="Din adgangskode" required />
            </div>

            <div class="form-actions" style="margin-top:1.25rem; padding-top:0; border-top:none;">
                <button type="submit" class="btn btn-primary btn-block">Log ind</button>
            </div>
        </form>

        <div class="auth-footer">
            Har du ikke en konto? <a th:href="@{/user/createUser}">Opret bruger</a>
        </div>
    </div>
</div>

</body>
</html>
