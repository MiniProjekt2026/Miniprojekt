<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Log ind – Ønskeskyen</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Ønskeskyen</h1>
            <p>Log ind for at se dine ønskelister</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/user/login}" method="post">
            <div class="form-group">
                <label for="username">Brugernavn</label>
                <input type="text" id="username" name="username" placeholder="Dit brugernavn" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">Adgangskode</label>
                <input type="password" id="password" name="password" placeholder="Din adgangskode" required />
            </div>

            <button type="submit" class="btn btn-primary btn-block">Log ind</button>
        </form>

        <div class="auth-footer">
            Har du ikke en konto? <a th:href="@{/user/createUser}">Opret bruger</a>
        </div>
    </div>
</div>

</body>
</html>
