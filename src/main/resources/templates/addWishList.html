<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny ønskeliste – Ønskelisten</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/users/{userId}/wishlists(userId=${userId})}">Ønske<span>listen</span></a>
    <div class="navbar-links">
        <a th:href="@{/users/{userId}/wishlists(userId=${userId})}">Mine lister</a>
    </div>
</nav>

<div class="page-wrapper">
    <a class="back-link" th:href="@{/users/{userId}/wishlists(userId=${userId})}">← Tilbage til ønskelister</a>

    <div class="page-header" style="margin-top:1rem">
        <h1>Ny ønskeliste</h1>
        <p>Giv din liste et navn</p>
    </div>

    <div class="form-card">
        <form th:action="@{/users/{userId}/wishlists/save(userId=${userId})}"
              th:object="${wishList}"
              method="post">

            <input type="hidden" th:field="*{userId}" />

            <div class="form-group">
                <label for="name">Navn på ønskelisten</label>
                <input type="text" id="name" th:field="*{name}"
                       placeholder="F.eks. Julegaver 2024" required autofocus />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Opret ønskeliste</button>
                <a class="btn btn-secondary" th:href="@{/users/{userId}/wishlists(userId=${userId})}">Annuller</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
