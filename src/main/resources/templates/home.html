<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min forside – Ønskelisten</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/home/{userId}(userId=${userId})}">Ønske<span>skyen</span></a>
    <div class="navbar-links">
        <a th:href="@{/user/login}">Log ud</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1>Velkommen</h1>
        <p>Hvad vil du gøre i dag?</p>
    </div>

    <div class="wishlist-grid">
        <a class="wishlist-card" th:href="@{/users/{userId}/wishlists(userId=${userId})}">
            <div class="wishlist-card-info">
                <h3>Mine ønskelister</h3>
                <p>Se og administrer dine lister</p>
            </div>
        </a>

        <a class="wishlist-card" th:href="@{/users/{userId}/wishlists/add(userId=${userId})}">
            <div class="wishlist-card-info">
                <h3>Opret ønskeliste</h3>
                <p>Lav en ny liste til dine ønsker</p>
            </div>
        </a>
    </div>
</div>

</body>
</html>
