<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${wishList.name} + ' – Ønskelisten'">Ønskeliste – Ønskelisten</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar">
    <!--
        FIX: was using ${wishList.userId} in all href expressions.
        The controller already adds userId to the model as a plain attribute — use that instead.
        ${wishList.userId} is fragile: if wishList is ever null, Thymeleaf throws before any guard,
        causing a Whitelabel error. ${userId} is always safe since it comes straight from @PathVariable.
    -->
    <a class="navbar-brand" th:href="@{/users/{userId}/wishlists(userId=${userId})}">Ønske<span>listen</span></a>
    <div class="navbar-links">
        <a th:href="@{/users/{userId}/wishlists(userId=${userId})}">← Mine lister</a>
    </div>
</nav>

<div class="page-wrapper">
    <a class="back-link" th:href="@{/users/{userId}/wishlists(userId=${userId})}">← Tilbage til ønskelister</a>

    <div class="top-row" style="margin-top:1rem">
        <div class="page-header" style="margin-bottom:0">
            <h1 th:text="${wishList.name}">Ønskeliste</h1>
            <p>Dine ønsker på denne liste</p>
        </div>
        <div class="section-actions">
            <a class="btn btn-secondary"
               th:href="@{/users/{userId}/wishlists/{wishListId}/edit(userId=${userId}, wishListId=${wishList.wishListId})}">
                Rediger liste
            </a>
            <a class="btn btn-primary"
               th:href="@{/wishlists/{wishListId}/wishes/add(wishListId=${wishList.wishListId})}">
                + Nyt ønske
            </a>
        </div>
    </div>

    <!--
        FIX: was iterating ${wishList.wishes} for the list but checking ${wishes} (the separate
        model attribute) for the empty state — inconsistent. The controller adds BOTH to the model.
        Use ${wishes} (the dedicated model attribute) for everything so it's consistent and
        the empty-state guard actually matches what the list renders.
    -->
    <div th:if="${wishes != null and !wishes.isEmpty()}" class="wish-list">
        <a th:each="wish : ${wishes}"
           class="wish-item"
           th:href="@{/wishlists/{wishListId}/wishes/{wishId}(wishListId=${wishList.wishListId}, wishId=${wish.wishId})}">
            <div class="wish-item-info">
                <h4 th:text="${wish.name}">Ønske</h4>
                <p th:text="${wish.description != null and !#strings.isEmpty(wish.description) ? wish.description : 'Ingen beskrivelse'}">
                    Beskrivelse
                </p>
            </div>
            <div class="wish-item-meta">
                <span class="price-badge"
                      th:text="${wish.price != null ? wish.price + ' kr.' : 'Pris ukendt'}">
                    Pris
                </span>
            </div>
        </a>
    </div>

    <!-- FIX: was checking ${wishes == null or wishes.isEmpty()} while rendering from ${wishList.wishes} above -->
    <div th:if="${wishes == null or wishes.isEmpty()}" class="empty-state card">
        <span class="icon">🎁</span>
        <h3>Ingen ønsker endnu</h3>
        <p>Tilføj det første ønske til listen</p>
        <a class="btn btn-primary"
           th:href="@{/wishlists/{wishListId}/wishes/add(wishListId=${wishList.wishListId})}">
            + Tilføj ønske
        </a>
    </div>
</div>

</body>
</html>
